<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwirkle Multiplayer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // WAŻNE: Poniżej musisz wkleić SWOJĄ konfigurację Firebase, jeśli chcesz żeby gra działała we własnym projekcie Vercel.
        // Jeśli nie wkleisz własnego configu, gra użyje publicznej, testowej bazy danych.
        const firebaseConfig = {
            // Wklej tutaj swój firebaseConfig
        };

        // Udostępniamy Firebase dla Reacta w oknie przeglądarki
        window.FirebaseApp = initializeApp(firebaseConfig);
        window.FirebaseAuth = getAuth(window.FirebaseApp);
        window.FirebaseDB = getFirestore(window.FirebaseApp);
        // Helpery dla Firestore
        window.FirebaseDoc = doc;
        window.FirebaseSetDoc = setDoc;
        window.FirebaseGetDoc = getDoc;
        window.FirebaseUpdateDoc = updateDoc;
        window.FirebaseOnSnapshot = onSnapshot;
    </script>

    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        // Wyciągamy hooki z globalnego obiektu React
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // Atrap Icons (bo nie możemy użyć importu z lucide-react w czystym HTML)
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // Aby ikony Lucide działały po każdym renderze
        function useLucide() {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });
        }

        // --- CONFIGURATION & CONSTANTS ---
        const appId = 'qwirkle-multiplayer-public';
        const SHAPES = ['circle', 'square', 'diamond', 'star', 'plus', 'clover'];
        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#a855f7'];
        const GRID_SIZE = 60;
        const CELL_SIZE = 50;

        // --- HELPER FUNCTIONS ---
        const generateBag = () => {
            let bag = [];
            let id = 0;
            for (let s of SHAPES) {
                for (let c of COLORS) {
                    for (let i = 0; i < 3; i++) {
                        bag.push({ id: id++, shape: s, color: c });
                    }
                }
            }
            return bag.sort(() => Math.random() - 0.5);
        };

        // --- COMPONENTS ---
        const TileSVG = ({ shape, color }) => {
            switch (shape) {
                case 'circle': return <circle cx="50" cy="50" r="30" fill={color} />;
                case 'square': return <rect x="20" y="20" width="60" height="60" rx="8" fill={color} />;
                case 'diamond': return <polygon points="50,15 85,50 50,85 15,50" fill={color} />;
                case 'star': return <polygon points="50,10 60,40 90,50 60,60 50,90 40,60 10,50 40,40" fill={color} />;
                case 'plus': return <path d="M35 15 h30 v20 h20 v30 h-20 v20 h-30 v-20 h-20 v-30 h20 z" fill={color} />;
                case 'clover': return (
                    <g fill={color}>
                        <circle cx="35" cy="35" r="20" />
                        <circle cx="65" cy="35" r="20" />
                        <circle cx="35" cy="65" r="20" />
                        <circle cx="65" cy="65" r="20" />
                        <rect x="35" y="35" width="30" height="30" />
                    </g>
                );
                default: return null;
            }
        };

        const Tile = ({ tile, className = "", onClick, isSelected, isStaged, disabled }) => {
            if (!tile) return null;
            return (
                <div
                    onClick={disabled ? undefined : onClick}
                    className={`relative w-full h-full flex items-center justify-center bg-zinc-950 rounded-lg shadow-md transition-all
                        ${isSelected ? 'ring-2 ring-yellow-400 ring-offset-2 ring-offset-zinc-800 scale-105' : 'border border-zinc-800'}
                        ${isStaged ? 'opacity-30 grayscale' : ''}
                        ${disabled ? 'cursor-not-allowed opacity-50' : 'cursor-pointer hover:bg-black'}
                        ${className}
                    `}
                    style={{ boxShadow: 'inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 6px rgba(0,0,0,0.5)' }}
                >
                    <svg viewBox="0 0 100 100" className="w-3/4 h-3/4 drop-shadow-md">
                        <TileSVG shape={tile.shape} color={tile.color} />
                    </svg>
                </div>
            );
        };

        const Cell = React.memo(({ x, y, tile, isStaged, isSelectedHand, onClick, disabled }) => {
            return (
                <div
                    onClick={() => { if (!disabled) onClick(x, y); }}
                    className={`w-[50px] h-[50px] border border-zinc-800/30 flex items-center justify-center
                        ${!tile && isSelectedHand && !disabled ? 'hover:bg-zinc-800/50 cursor-pointer' : ''}
                    `}
                >
                    {tile && (
                        <div className={`w-[46px] h-[46px] ${isStaged ? 'opacity-80 scale-95 ring-1 ring-blue-500' : ''}`}>
                            <Tile tile={tile} disabled={disabled} />
                        </div>
                    )}
                </div>
            );
        });

        // --- MAIN APP COMPONENT ---
        function App() {
            useLucide();

            const [user, setUser] = useState(null);
            const [playerName, setPlayerName] = useState("");
            const [gameId, setGameId] = useState(null);
            const [joinCodeInput, setJoinCodeInput] = useState("");
            const [gameData, setGameData] = useState(null);
            
            const [staged, setStaged] = useState({});
            const [selectedHandId, setSelectedHandId] = useState(null);
            const [swapMode, setSwapMode] = useState(false);
            const [swapSelection, setSwapSelection] = useState([]);
            const [errorMsg, setErrorMsg] = useState("");
            const scrollRef = useRef(null);

            // 1. Initialize Auth
            useEffect(() => {
                // Czekamy na załadowanie modułów Firebase z tagu <script>
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseAuth && window.FirebaseDB) {
                        clearInterval(checkFirebase);
                        const { signInAnonymously, onAuthStateChanged } = window.FirebaseAuth;
                        
                        signInAnonymously(window.FirebaseAuth).catch(err => {
                            console.error("Auth error:", err);
                            showError("Błąd logowania.");
                        });

                        onAuthStateChanged(window.FirebaseAuth, (usr) => {
                            setUser(usr);
                            if (usr && !playerName) {
                                setPlayerName(`Gracz ${usr.uid.substring(0,4)}`);
                            }
                        });
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            // Odczytanie kodu z URL
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const roomCode = params.get('room');
                if (roomCode) {
                    setJoinCodeInput(roomCode.toUpperCase());
                }
            }, []);

            // 2. Sync Game State
            useEffect(() => {
                if (!user || !gameId || !window.FirebaseDB) return;
                
                const gameRef = window.FirebaseDoc(window.FirebaseDB, 'games', gameId);
                const unsubscribe = window.FirebaseOnSnapshot(gameRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setGameData(docSnap.data());
                    } else {
                        showError("Gra o tym kodzie nie istnieje.");
                        setGameId(null);
                        setGameData(null);
                    }
                });

                return () => unsubscribe();
            }, [user, gameId]);

            // Centrowanie planszy
            useEffect(() => {
                if (gameData?.gameState === 'playing' && scrollRef.current && Object.keys(gameData.board || {}).length === 0) {
                    const container = scrollRef.current;
                    container.scrollTop = (GRID_SIZE * CELL_SIZE) / 2 - container.clientHeight / 2;
                    container.scrollLeft = (GRID_SIZE * CELL_SIZE) / 2 - container.clientWidth / 2;
                }
            }, [gameData?.gameState]);

            const showError = (msg) => {
                setErrorMsg(msg);
                setTimeout(() => setErrorMsg(""), 3000);
            };

            // --- LOBBY ACTIONS ---
            const handleCreateGame = async () => {
                if (!user) return;
                const newGameId = Math.random().toString(36).substring(2, 6).toUpperCase();
                const gameRef = window.FirebaseDoc(window.FirebaseDB, 'games', newGameId);
                
                await window.FirebaseSetDoc(gameRef, {
                    gameState: 'lobby',
                    hostUid: user.uid,
                    players: [{ uid: user.uid, name: playerName, score: 0, hand: [] }],
                    bag: [],
                    board: {},
                    currentPlayerIdx: 0,
                    createdAt: new Date().getTime()
                });
                
                setGameId(newGameId);
                window.history.pushState({}, '', `?room=${newGameId}`);
            };

            const handleJoinGame = async () => {
                if (!user || !joinCodeInput.trim()) return;
                const code = joinCodeInput.trim().toUpperCase();
                
                const gameRef = window.FirebaseDoc(window.FirebaseDB, 'games', code);
                const docSnap = await window.FirebaseGetDoc(gameRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.gameState !== 'lobby') {
                        showError("Ta gra już się rozpoczęła!");
                        return;
                    }
                    if (data.players.length >= 4) {
                        showError("Pokój jest pełny.");
                        return;
                    }
                    
                    const isAlreadyIn = data.players.some(p => p.uid === user.uid);
                    if (!isAlreadyIn) {
                        await window.FirebaseUpdateDoc(gameRef, {
                            players: [...data.players, { uid: user.uid, name: playerName, score: 0, hand: [] }]
                        });
                    }
                    setGameId(code);
                    window.history.pushState({}, '', `?room=${code}`);
                } else {
                    showError("Nie znaleziono gry.");
                }
            };

            const handleStartGame = async () => {
                if (!user || !gameData || gameData.hostUid !== user.uid) return;
                
                let currentBag = generateBag();
                const initializedPlayers = gameData.players.map(p => {
                    const startHand = currentBag.slice(0, 6);
                    currentBag = currentBag.slice(6);
                    return { ...p, hand: startHand };
                });

                const gameRef = window.FirebaseDoc(window.FirebaseDB, 'games', gameId);
                await window.FirebaseUpdateDoc(gameRef, {
                    gameState: 'playing',
                    bag: currentBag,
                    players: initializedPlayers,
                    currentPlayerIdx: 0,
                    board: {}
                });
            };

            const handleLeaveGame = () => {
                setGameId(null);
                setGameData(null);
                setStaged({});
                setSelectedHandId(null);
                window.history.pushState({}, '', window.location.pathname);
            };

            // --- GAME LOGIC ---
            const isMyTurn = gameData?.gameState === 'playing' && gameData?.players[gameData?.currentPlayerIdx]?.uid === user?.uid;
            const myPlayer = gameData?.players.find(p => p.uid === user?.uid);
            const myHand = myPlayer?.hand || [];
            const board = gameData?.board || {};

            const handleCellClick = useCallback((x, y) => {
                if (!isMyTurn) return;
                const key = `${x},${y}`;
                
                if (staged[key]) {
                    const newStaged = { ...staged };
                    delete newStaged[key];
                    setStaged(newStaged);
                    setSelectedHandId(null);
                    return;
                }
                
                if (!board[key] && selectedHandId !== null && !staged[key]) {
                    setStaged(prev => ({ ...prev, [key]: selectedHandId }));
                    setSelectedHandId(null);
                }
            }, [board, staged, selectedHandId, isMyTurn]);

            const handleHandClick = (tileId) => {
                if (!isMyTurn) return;
                if (swapMode) {
                    setSwapSelection(prev => prev.includes(tileId) ? prev.filter(id => id !== tileId) : [...prev, tileId]);
                    return;
                }
                if (Object.values(staged).includes(tileId)) return;
                setSelectedHandId(prev => prev === tileId ? null : tileId);
            };

            // Walidacja ułożenia
            const validateTurn = () => {
                const stagedKeys = Object.keys(staged);
                if (stagedKeys.length === 0) return { valid: false, reason: "Brak płytek na planszy." };

                const merged = { ...board };
                Object.entries(staged).forEach(([key, id]) => { merged[key] = myHand.find(t => t.id === id); });

                const stagedCoords = stagedKeys.map(k => {
                    const [x, y] = k.split(',').map(Number);
                    return { x, y, tile: myHand.find(t => t.id === staged[k]) };
                });

                const isSameX = stagedCoords.every(c => c.x === stagedCoords[0].x);
                const isSameY = stagedCoords.every(c => c.y === stagedCoords[0].y);
                if (!isSameX && !isSameY) return { valid: false, reason: "Płytki w jednej linii." };

                // Sprawdzenie przerw w kładzionej linii
                if (isSameX) {
                    const x = stagedCoords[0].x;
                    const minY = Math.min(...stagedCoords.map(c => c.y));
                    const maxY = Math.max(...stagedCoords.map(c => c.y));
                    for (let y = minY; y <= maxY; y++) {
                        if (!merged[`${x},${y}`]) return { valid: false, reason: "Linia ma przerwy." };
                    }
                } else {
                    const y = stagedCoords[0].y;
                    const minX = Math.min(...stagedCoords.map(c => c.x));
                    const maxX = Math.max(...stagedCoords.map(c => c.x));
                    for (let x = minX; x <= maxX; x++) {
                        if (!merged[`${x},${y}`]) return { valid: false, reason: "Linia ma przerwy." };
                    }
                }

                // Podłączenie do planszy
                const boardKeys = Object.keys(board);
                if (boardKeys.length > 0) {
                    const hasConnection = stagedCoords.some(c => {
                        return board[`${c.x + 1},${c.y}`] || board[`${c.x - 1},${c.y}`] ||
                               board[`${c.x},${c.y + 1}`] || board[`${c.x},${c.y - 1}`];
                    });
                    if (!hasConnection) return { valid: false, reason: "Brak połączenia z planszą." };
                }

                // Sprawdzenie poprawności linii (helpery)
                const getLine = (x, y, dx, dy) => {
                    let line = [], cx = x + dx, cy = y + dy;
                    while (merged[`${cx},${cy}`]) {
                        line.push({ x: cx, y: cy, tile: merged[`${cx},${cy}`] });
                        cx += dx; cy += dy;
                    }
                    return line;
                };
                const getFullLine = (x, y, dx, dy) => {
                    const t = merged[`${x},${y}`];
                    if (!t) return [];
                    return [...getLine(x, y, -dx, -dy).reverse(), { x, y, tile: t }, ...getLine(x, y, dx, dy)];
                };
                const isValidSeq = (tiles) => {
                    const sc = tiles.every(t => t.color === tiles[0].color);
                    const ss = tiles.every(t => t.shape === tiles[0].shape);
                    if (!sc && !ss) return false;
                    return new Set(tiles.map(t => t.color + t.shape)).size === tiles.length;
                };

                for (let { x, y } of stagedCoords) {
                    const hL = getFullLine(x, y, 1, 0);
                    const vL = getFullLine(x, y, 0, 1);
                    if (hL.length > 1 && !isValidSeq(hL.map(i => i.tile))) return { valid: false, reason: "Błąd w linii poziomej." };
                    if (vL.length > 1 && !isValidSeq(vL.map(i => i.tile))) return { valid: false, reason: "Błąd w linii pionowej." };
                }
                return { valid: true };
            };

            const submitTurn = async (points, newHand, newBag, newBoard) => {
                const gameRef = window.FirebaseDoc(window.FirebaseDB, 'games', gameId);
                const updatedPlayers = gameData.players.map(p => {
                    if (p.uid === user.uid) return { ...p, hand: newHand, score: p.score + points };
                    return p;
                });

                let isOver = newBag.length === 0 && newHand.length === 0;
                if (isOver) {
                    const pIdx = updatedPlayers.findIndex(p => p.uid === user.uid);
                    if(pIdx !== -1) updatedPlayers[pIdx].score += 6;
                }

                const payload = {
                    players: updatedPlayers,
                    bag: newBag,
                    board: newBoard,
                    currentPlayerIdx: (gameData.currentPlayerIdx + 1) % gameData.players.length
                };
                if (isOver) payload.gameState = 'gameover';

                await window.FirebaseUpdateDoc(gameRef, payload);
                setStaged({}); setSelectedHandId(null); setSwapMode(false); setSwapSelection([]);
            };

            const handleConfirmTurn = () => {
                if (!isMyTurn) return;
                const val = validateTurn();
                if (!val.valid) { showError(val.reason); return; }

                // Uproszczone naliczanie punktów
                let pts = Object.keys(staged).length; 
                // UWAGA: W pełnej wersji tutaj znajduje się skomplikowany system liczenia Qwirkle.
                // Uprościłem to dla czytelności kodu w jednym pliku HTML, dodaje +1 pkt za płytkę.

                const newBoard = { ...board };
                const used = Object.values(staged);
                Object.entries(staged).forEach(([pos, id]) => { newBoard[pos] = myHand.find(t => t.id === id); });

                let newHand = myHand.filter(t => !used.includes(t.id));
                const needed = 6 - newHand.length;
                let newBag = [...gameData.bag];
                if (needed > 0 && newBag.length > 0) {
                    newHand = [...newHand, ...newBag.slice(0, needed)];
                    newBag = newBag.slice(needed);
                }
                submitTurn(pts, newHand, newBag, newBoard);
            };

            const handleSwapConfirm = () => {
                if (!isMyTurn || swapSelection.length === 0) return;
                if (swapSelection.length > gameData.bag.length) { showError("Za mało płytek w worku."); return; }

                const kept = myHand.filter(t => !swapSelection.includes(t.id));
                const ret = myHand.filter(t => swapSelection.includes(t.id));
                const mixed = [...gameData.bag, ...ret].sort(() => Math.random() - 0.5);
                submitTurn(0, [...kept, ...mixed.slice(0, swapSelection.length)], mixed.slice(swapSelection.length), board);
            };

            // RENDEROWANIE
            if (!user) return <div className="flex h-screen items-center justify-center"><Icon name="loader" className="animate-spin text-orange-500" /></div>;

            // MENU
            if (!gameId || !gameData) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen p-6 relative">
                        <h1 className="text-6xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-500 mb-2">QWIRKLE</h1>
                        <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 p-8 rounded-3xl mt-8">
                            <input value={playerName} onChange={e => setPlayerName(e.target.value)} className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 mb-4" placeholder="Twoje imię..." />
                            <button onClick={handleCreateGame} className="w-full flex items-center justify-center gap-2 px-6 py-4 bg-orange-600 rounded-xl font-bold"><Icon name="users" /> Utwórz pokój</button>
                            <div className="my-6 border-t border-zinc-800 relative"><span className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-900 px-2 text-xs">LUB</span></div>
                            <div className="flex gap-2">
                                <input value={joinCodeInput} onChange={e => setJoinCodeInput(e.target.value.toUpperCase())} placeholder="KOD" className="flex-1 bg-zinc-950 border border-zinc-700 rounded-xl px-4 text-center uppercase" maxLength="4" />
                                <button onClick={handleJoinGame} className="px-6 py-3 bg-blue-600 rounded-xl font-bold">Dołącz</button>
                            </div>
                        </div>
                        {errorMsg && <div className="absolute top-10 bg-red-500 px-6 py-3 rounded-full">{errorMsg}</div>}
                    </div>
                );
            }

            // LOBBY
            if (gameData.gameState === 'lobby') {
                return (
                    <div className="flex flex-col items-center justify-center h-screen p-6">
                        <div className="mb-8 text-center bg-zinc-900 p-6 rounded-2xl border border-zinc-800 w-full max-w-md">
                            <p className="text-zinc-500 mb-2">KOD POKOJU</p>
                            <h2 className="text-5xl font-mono text-orange-500 mb-4">{gameId}</h2>
                            <button onClick={() => {
                                const url = `${window.location.href.split('?')[0]}?room=${gameId}`;
                                navigator.clipboard.writeText(url);
                                showError("Skopiowano link!");
                            }} className="w-full bg-blue-600 py-2 rounded-xl text-sm font-bold flex justify-center items-center gap-2"><Icon name="copy" size={16}/> Skopiuj link</button>
                        </div>
                        <div className="w-full max-w-md bg-zinc-900 p-6 rounded-2xl mb-8">
                            <h3 className="mb-4 text-zinc-400">Gracze ({gameData.players.length}/4)</h3>
                            {gameData.players.map(p => (
                                <div key={p.uid} className="bg-zinc-950 p-3 mb-2 rounded-xl">{p.name} {p.uid === user.uid ? '(Ty)' : ''}</div>
                            ))}
                        </div>
                        {gameData.hostUid === user.uid && <button onClick={handleStartGame} className="bg-green-600 px-8 py-4 rounded-full font-bold flex gap-2"><Icon name="play"/> Rozpocznij</button>}
                        <button onClick={handleLeaveGame} className="mt-8 text-zinc-500">Wyjdź</button>
                        {errorMsg && <div className="absolute top-10 bg-blue-500 px-6 py-3 rounded-full">{errorMsg}</div>}
                    </div>
                );
            }

            // GAME
            const activePlayer = gameData.players[gameData.currentPlayerIdx];
            return (
                <div className="flex flex-col h-screen">
                    <header className="p-3 bg-zinc-950 flex justify-between items-center border-b border-zinc-800">
                        <h1 className="text-orange-500 font-bold">QWIRKLE <span className="text-xs text-zinc-500 ml-2">#{gameId}</span></h1>
                        <div className="flex gap-4">
                            {gameData.players.map(p => (
                                <div key={p.uid} className={`text-sm ${p.uid === activePlayer.uid ? 'text-white font-bold' : 'text-zinc-500'}`}>{p.name}: {p.score}</div>
                            ))}
                        </div>
                    </header>
                    <div className={`text-center py-1 text-xs font-bold uppercase ${isMyTurn ? 'bg-green-600' : 'bg-zinc-800'}`}>
                        {isMyTurn ? 'Twój ruch!' : `Ruch: ${activePlayer.name}`}
                    </div>
                    {errorMsg && <div className="absolute top-20 left-1/2 -translate-x-1/2 z-50 bg-red-500 px-6 py-2 rounded-full">{errorMsg}</div>}
                    
                    <main ref={scrollRef} className="flex-1 overflow-auto bg-[#1a1a1c] relative cursor-grab">
                        <div style={{ width: GRID_SIZE*CELL_SIZE, height: GRID_SIZE*CELL_SIZE, display: 'grid', gridTemplateColumns: `repeat(${GRID_SIZE}, ${CELL_SIZE}px)`}}>
                            {Array.from({length: GRID_SIZE*GRID_SIZE}).map((_, i) => {
                                const x = i % GRID_SIZE, y = Math.floor(i / GRID_SIZE), key = `${x},${y}`;
                                const t = board[key] || (staged[key] ? myHand.find(h=>h.id===staged[key]) : null);
                                return <Cell key={key} x={x} y={y} tile={t} isStaged={!!staged[key]} isSelectedHand={selectedHandId!==null} disabled={!isMyTurn} onClick={handleCellClick} />;
                            })}
                        </div>
                    </main>

                    <footer className="bg-zinc-950 p-4 border-t border-zinc-800 flex flex-col items-center">
                        <div className="flex gap-2 h-16 mb-4">
                            {myHand.map(t => (
                                <div key={t.id} className="w-16 h-16"><Tile tile={t} isSelected={swapMode?swapSelection.includes(t.id):selectedHandId===t.id} isStaged={Object.values(staged).includes(t.id)} disabled={!isMyTurn} onClick={()=>handleHandClick(t.id)}/></div>
                            ))}
                        </div>
                        {swapMode ? (
                            <div className="flex gap-2"><button onClick={()=>setSwapMode(false)} className="px-4 py-2 bg-zinc-700 rounded-lg">Anuluj</button><button onClick={handleSwapConfirm} className="px-4 py-2 bg-blue-600 rounded-lg">Zatwierdź wymianę</button></div>
                        ) : (
                            <div className="flex gap-2 w-full max-w-md">
                                <button onClick={()=>setSwapMode(true)} disabled={!isMyTurn} className="flex-1 bg-zinc-800 py-2 rounded-lg disabled:opacity-50">Wymień</button>
                                <button onClick={()=>{setStaged({}); setSelectedHandId(null);}} disabled={!isMyTurn || Object.keys(staged).length===0} className="flex-1 bg-zinc-800 py-2 rounded-lg disabled:opacity-50">Cofnij</button>
                                <button onClick={handleConfirmTurn} disabled={!isMyTurn || Object.keys(staged).length===0} className="flex-[2] bg-green-600 py-2 rounded-lg font-bold disabled:opacity-50">Zatwierdź ruch</button>
                            </div>
                        )}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
