<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwirkle Multiplayer - Ad Hoc</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // TUTAJ WKLEJ SWOJE KLUCZE Z SUPABASE:
        const SUPABASE_URL = 'https://ocjrmtnutfcayfzabbvn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9janJtdG51dGZjYXlmemFiYnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjYzMjYsImV4cCI6MjA5MzA0MjMyNn0.xuO2g4tUDoQrZ2BrKpBVGr3pte6zVhpBpgB3ZQ1Z9TA';

        // Inicjalizacja Supabase
        if (SUPABASE_URL && SUPABASE_ANON_KEY) {
            window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // Generowanie i zapisywanie UID lokalnie
        let myUid = localStorage.getItem('qwirkle_uid');
        if (!myUid) {
            myUid = 'usr_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('qwirkle_uid', myUid);
        }
        window.MY_UID = myUid;
    </script>
</head>
<body class="bg-zinc-950 text-white overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const supabase = window.supabaseClient;
        const MY_UID = window.MY_UID;

        // Wrapper dla Lucide, aby nie gryzło się z wirtualnym DOM Reacta
        const Icon = ({ name, size = 24, className = "" }) => {
            const wrapperRef = useRef(null);
            
            useEffect(() => {
                if (wrapperRef.current && window.lucide) {
                    wrapperRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: wrapperRef.current });
                }
            }, [name, size, className]);

            return <span ref={wrapperRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        const SHAPES = ['circle', 'square', 'diamond', 'star', 'plus', 'clover'];
        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#a855f7'];
        const GRID_SIZE = 60;
        const CELL_SIZE = 50;

        const generateBag = () => {
            let bag = [];
            let id = 0;
            for (let s of SHAPES) for (let c of COLORS) for (let i = 0; i < 3; i++) bag.push({ id: id++, shape: s, color: c });
            return bag.sort(() => Math.random() - 0.5);
        };

        const TileSVG = ({ shape, color }) => {
            switch (shape) {
                case 'circle': return <circle cx="50" cy="50" r="30" fill={color} />;
                case 'square': return <rect x="20" y="20" width="60" height="60" rx="8" fill={color} />;
                case 'diamond': return <polygon points="50,15 85,50 50,85 15,50" fill={color} />;
                case 'star': return <polygon points="50,10 60,40 90,50 60,60 50,90 40,60 10,50 40,40" fill={color} />;
                case 'plus': return <path d="M35 15 h30 v20 h20 v30 h-20 v20 h-30 v-20 h-20 v-30 h20 z" fill={color} />;
                case 'clover': return (
                    <g fill={color}>
                        <circle cx="35" cy="35" r="20" /><circle cx="65" cy="35" r="20" />
                        <circle cx="35" cy="65" r="20" /><circle cx="65" cy="65" r="20" />
                        <rect x="35" y="35" width="30" height="30" />
                    </g>
                );
                default: return null;
            }
        };

        const Tile = ({ tile, className = "", onClick, isSelected, isStaged, disabled }) => {
            if (!tile) return null;
            return (
                <div onClick={disabled ? undefined : onClick}
                    className={`relative w-full h-full flex items-center justify-center bg-zinc-950 rounded-lg shadow-md transition-all
                        ${isSelected ? 'ring-2 ring-yellow-400 ring-offset-2 scale-105' : 'border border-zinc-800'}
                        ${isStaged ? 'opacity-30 grayscale' : ''} ${disabled ? 'cursor-not-allowed opacity-50' : 'cursor-pointer hover:bg-black'} ${className}`}
                >
                    <svg viewBox="0 0 100 100" className="w-3/4 h-3/4"><TileSVG shape={tile.shape} color={tile.color} /></svg>
                </div>
            );
        };

        const Cell = React.memo(({ x, y, tile, isStaged, isSelectedHand, onClick, disabled }) => (
            <div onClick={() => { if (!disabled) onClick(x, y); }} className={`w-[50px] h-[50px] border border-zinc-800/30 flex items-center justify-center ${!tile && isSelectedHand && !disabled ? 'hover:bg-zinc-800/50 cursor-pointer' : ''}`}>
                {tile && <div className={`w-[46px] h-[46px] ${isStaged ? 'opacity-80 scale-95 ring-1 ring-blue-500' : ''}`}><Tile tile={tile} disabled={disabled} /></div>}
            </div>
        ));

        function App() {
            const [playerName, setPlayerName] = useState(localStorage.getItem('qwirkle_name') || "");
            const [gameId, setGameId] = useState(null);
            const [joinCodeInput, setJoinCodeInput] = useState("");
            const [gameData, setGameData] = useState(null);
            const [staged, setStaged] = useState({});
            const [selectedHandId, setSelectedHandId] = useState(null);
            const [swapMode, setSwapMode] = useState(false);
            const [swapSelection, setSwapSelection] = useState([]);
            const [errorMsg, setErrorMsg] = useState("");
            const [criticalError, setCriticalError] = useState(!supabase);
            const scrollRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const roomCode = params.get('room');
                if (roomCode) setJoinCodeInput(roomCode.toUpperCase());
            }, []);

            // Nasłuchiwanie zmian z Supabase
            useEffect(() => {
                if (!supabase || !gameId) return;

                supabase.from('games').select('state').eq('id', gameId).single().then(({ data, error }) => {
                    if (data) setGameData(data.state);
                    else {
                        showError("Gra o tym kodzie nie istnieje.");
                        setGameId(null);
                    }
                });

                const channel = supabase.channel(`game_${gameId}`)
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'games', filter: `id=eq.${gameId}` }, 
                    (payload) => {
                        setGameData(payload.new.state);
                    }).subscribe();

                return () => supabase.removeChannel(channel);
            }, [gameId]);

            // Wyśrodkowanie planszy
            useEffect(() => {
                if (gameData?.gameState === 'playing' && scrollRef.current && Object.keys(gameData.board || {}).length === 0) {
                    const c = scrollRef.current;
                    c.scrollTop = (GRID_SIZE * CELL_SIZE) / 2 - c.clientHeight / 2;
                    c.scrollLeft = (GRID_SIZE * CELL_SIZE) / 2 - c.clientWidth / 2;
                }
            }, [gameData?.gameState]);

            const showError = (msg) => { setErrorMsg(msg); setTimeout(() => setErrorMsg(""), 3000); };

            const handleNameChange = (val) => {
                setPlayerName(val);
                localStorage.setItem('qwirkle_name', val);
            };

            // --- GAME ACTIONS ---
            const handleCreateGame = async () => {
                if (!playerName.trim()) return showError("Podaj swoje imię!");
                // Zmieniono długość kodu na 6 znaków
                const newGameId = Math.random().toString(36).substring(2, 8).toUpperCase();
                
                const initialState = {
                    gameState: 'lobby', hostUid: MY_UID, players: [{ uid: MY_UID, name: playerName, score: 0, hand: [] }],
                    bag: [], board: {}, currentPlayerIdx: 0
                };

                const { error } = await supabase.from('games').insert([{ id: newGameId, state: initialState }]);
                
                if (error) return showError("Błąd serwera. Nie udało się utworzyć pokoju.");
                
                setGameId(newGameId);
                window.history.pushState({}, '', `?room=${newGameId}`);
            };

            const handleJoinGame = async () => {
                if (!playerName.trim()) return showError("Podaj swoje imię!");
                if (!joinCodeInput.trim()) return showError("Podaj kod!");
                const code = joinCodeInput.trim().toUpperCase();
                
                const { data, error } = await supabase.from('games').select('state').eq('id', code).single();
                
                if (data && data.state) {
                    let state = data.state;
                    if (state.gameState !== 'lobby') return showError("Gra się już rozpoczęła.");
                    if (state.players.length >= 4) return showError("Pokój pełny.");
                    
                    if (!state.players.some(p => p.uid === MY_UID)) {
                        state.players.push({ uid: MY_UID, name: playerName, score: 0, hand: [] });
                        await supabase.from('games').update({ state }).eq('id', code);
                    }
                    setGameId(code);
                    window.history.pushState({}, '', `?room=${code}`);
                } else {
                    showError("Błędny kod lub pokój nie istnieje.");
                }
            };

            const handleStartGame = async () => {
                let bag = generateBag();
                const players = gameData.players.map(p => { const h = bag.slice(0, 6); bag = bag.slice(6); return { ...p, hand: h }; });
                const newState = { ...gameData, gameState: 'playing', bag, players, currentPlayerIdx: 0, board: {} };
                await supabase.from('games').update({ state: newState }).eq('id', gameId);
            };

            const handleLeaveGame = () => { setGameId(null); setGameData(null); setStaged({}); setSelectedHandId(null); window.history.pushState({}, '', window.location.pathname); };

            const isMyTurn = gameData?.gameState === 'playing' && gameData?.players[gameData?.currentPlayerIdx]?.uid === MY_UID;
            const myHand = gameData?.players.find(p => p.uid === MY_UID)?.hand || [];
            const board = gameData?.board || {};

            const handleCellClick = useCallback((x, y) => {
                if (!isMyTurn) return;
                const key = `${x},${y}`;
                if (staged[key]) { const n = { ...staged }; delete n[key]; setStaged(n); setSelectedHandId(null); }
                else if (!board[key] && selectedHandId !== null && !staged[key]) { setStaged(p => ({ ...p, [key]: selectedHandId })); setSelectedHandId(null); }
            }, [board, staged, selectedHandId, isMyTurn]);

            const handleHandClick = (id) => {
                if (!isMyTurn) return;
                if (swapMode) return setSwapSelection(p => p.includes(id) ? p.filter(i => i !== id) : [...p, id]);
                if (!Object.values(staged).includes(id)) setSelectedHandId(p => p === id ? null : id);
            };

            // --- VALIDATION AND SCORING LOGIC ---
            const getMergedBoard = () => {
                const merged = { ...board };
                Object.entries(staged).forEach(([key, id]) => {
                    merged[key] = myHand.find(t => t.id === id);
                });
                return merged;
            };

            const getLine = (x, y, dx, dy, merged) => {
                let line = [];
                let cx = x + dx;
                let cy = y + dy;
                while (merged[`${cx},${cy}`]) {
                    line.push({ x: cx, y: cy, tile: merged[`${cx},${cy}`] });
                    cx += dx;
                    cy += dy;
                }
                return line;
            };

            const getFullLine = (x, y, dx, dy, merged) => {
                const tile = merged[`${x},${y}`];
                if (!tile) return [];
                const forward = getLine(x, y, dx, dy, merged);
                const backward = getLine(x, y, -dx, -dy, merged);
                return [...backward.reverse(), { x, y, tile }, ...forward];
            };

            const isValidSequence = (tiles) => {
                const allSameColor = tiles.every(t => t.color === tiles[0].color);
                const allSameShape = tiles.every(t => t.shape === tiles[0].shape);
                if (!allSameColor && !allSameShape) return false;
                
                const uniqueSet = new Set(tiles.map(t => t.color + t.shape));
                if (uniqueSet.size !== tiles.length) return false; // Duplicates are not allowed
                
                return true;
            };

            const validateTurn = () => {
                const stagedKeys = Object.keys(staged);
                if (stagedKeys.length === 0) return { valid: false, reason: "Brak płytek na planszy." };

                const merged = getMergedBoard();
                const stagedCoords = stagedKeys.map(k => {
                    const [x, y] = k.split(',').map(Number);
                    return { x, y, tile: myHand.find(t => t.id === staged[k]) };
                });

                const isSameX = stagedCoords.every(c => c.x === stagedCoords[0].x);
                const isSameY = stagedCoords.every(c => c.y === stagedCoords[0].y);
                if (!isSameX && !isSameY) return { valid: false, reason: "Płytki muszą być w jednej linii (pion lub poziom)." };

                if (isSameX) {
                    const x = stagedCoords[0].x;
                    const minY = Math.min(...stagedCoords.map(c => c.y));
                    const maxY = Math.max(...stagedCoords.map(c => c.y));
                    for (let y = minY; y <= maxY; y++) {
                        if (!merged[`${x},${y}`]) return { valid: false, reason: "Ułożona linia ma przerwy." };
                    }
                } else {
                    const y = stagedCoords[0].y;
                    const minX = Math.min(...stagedCoords.map(c => c.x));
                    const maxX = Math.max(...stagedCoords.map(c => c.x));
                    for (let x = minX; x <= maxX; x++) {
                        if (!merged[`${x},${y}`]) return { valid: false, reason: "Ułożona linia ma przerwy." };
                    }
                }

                const boardKeys = Object.keys(board);
                if (boardKeys.length > 0) {
                    const hasConnection = stagedCoords.some(c => {
                        return board[`${c.x + 1},${c.y}`] || board[`${c.x - 1},${c.y}`] ||
                               board[`${c.x},${c.y + 1}`] || board[`${c.x},${c.y - 1}`];
                    });
                    if (!hasConnection) return { valid: false, reason: "Brak połączenia z planszą." };
                }

                for (let { x, y } of stagedCoords) {
                    const hLine = getFullLine(x, y, 1, 0, merged);
                    const vLine = getFullLine(x, y, 0, 1, merged);

                    if (hLine.length > 1 && !isValidSequence(hLine.map(i => i.tile)))
                        return { valid: false, reason: "Błąd w linii poziomej: niedozwolona kombinacja lub duplikat." };
                    if (vLine.length > 1 && !isValidSequence(vLine.map(i => i.tile)))
                        return { valid: false, reason: "Błąd w linii pionowej: niedozwolona kombinacja lub duplikat." };
                }

                return { valid: true };
            };

            const calculateScore = () => {
                const merged = getMergedBoard();
                const stagedKeys = Object.keys(staged);
                const scoredHLines = new Set();
                const scoredVLines = new Set();
                let turnScore = 0;

                stagedKeys.forEach(k => {
                    const [x, y] = k.split(',').map(Number);
                    const hLine = getFullLine(x, y, 1, 0, merged);
                    const vLine = getFullLine(x, y, 0, 1, merged);

                    if (hLine.length > 1) {
                        const minX = Math.min(...hLine.map(i => i.x));
                        const maxX = Math.max(...hLine.map(i => i.x));
                        const lineId = `H,${y},${minX},${maxX}`;
                        if (!scoredHLines.has(lineId)) {
                            scoredHLines.add(lineId);
                            turnScore += hLine.length;
                            if (hLine.length === 6) turnScore += 6; // QWIRKLE BONUS
                        }
                    }

                    if (vLine.length > 1) {
                        const minY = Math.min(...vLine.map(i => i.y));
                        const maxY = Math.max(...vLine.map(i => i.y));
                        const lineId = `V,${x},${minY},${maxY}`;
                        if (!scoredVLines.has(lineId)) {
                            scoredVLines.add(lineId);
                            turnScore += vLine.length;
                            if (vLine.length === 6) turnScore += 6; // QWIRKLE BONUS
                        }
                    }
                });

                if (turnScore === 0 && stagedKeys.length > 0) turnScore = stagedKeys.length; 
                return turnScore;
            };

            const submitTurn = async (pts, hand, bag, newBoard) => {
                const p = gameData.players.map(pl => pl.uid === MY_UID ? { ...pl, hand, score: pl.score + pts } : pl);
                const isOver = bag.length === 0 && hand.length === 0;
                if (isOver) { const idx = p.findIndex(pl => pl.uid === MY_UID); if (idx !== -1) p[idx].score += 6; }
                
                const newState = {
                    ...gameData,
                    players: p, bag, board: newBoard, currentPlayerIdx: (gameData.currentPlayerIdx + 1) % p.length,
                    ...(isOver ? { gameState: 'gameover' } : {})
                };

                await supabase.from('games').update({ state: newState }).eq('id', gameId);
                setStaged({}); setSelectedHandId(null); setSwapMode(false); setSwapSelection([]);
            };

            const handleConfirmTurn = () => {
                if (!isMyTurn || Object.keys(staged).length === 0) return;
                
                const validation = validateTurn();
                if (!validation.valid) {
                    showError(validation.reason);
                    return;
                }

                const pts = calculateScore();

                const nb = { ...board };
                Object.entries(staged).forEach(([k, id]) => nb[k] = myHand.find(t => t.id === id));
                let nh = myHand.filter(t => !Object.values(staged).includes(t.id));
                let nb_bag = [...gameData.bag];
                if (6 - nh.length > 0 && nb_bag.length > 0) { nh = [...nh, ...nb_bag.slice(0, 6 - nh.length)]; nb_bag = nb_bag.slice(6 - nh.length); }
                
                submitTurn(pts, nh, nb_bag, nb);
            };

            const handleSwapConfirm = () => {
                if (!isMyTurn || swapSelection.length === 0) return;
                const kept = myHand.filter(t => !swapSelection.includes(t.id));
                const mix = [...gameData.bag, ...myHand.filter(t => swapSelection.includes(t.id))].sort(() => Math.random() - 0.5);
                submitTurn(0, [...kept, ...mix.slice(0, swapSelection.length)], mix.slice(swapSelection.length), board);
            };

            if (criticalError) return (
                <div className="flex flex-col h-screen items-center justify-center bg-red-950 p-6 text-center">
                    <Icon name="alert-circle" size={64} className="text-red-500 mb-4" />
                    <h1 className="text-3xl font-bold text-white mb-2">Brak konfiguracji Supabase!</h1>
                    <p className="text-red-200 mb-6 max-w-lg">
                        Aby gra działała, uzupełnij zmienne <code>SUPABASE_URL</code> oraz <code>SUPABASE_ANON_KEY</code> na górze pliku index.html.
                    </p>
                </div>
            );

            // --- LOBBY / MENU ---
            if (!gameId || !gameData) return (
                <div className="flex flex-col items-center justify-center h-screen p-6 relative">
                    <h1 className="text-6xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-500 mb-2">QWIRKLE</h1>
                    <p className="text-zinc-500 mb-8 text-lg">Podaj imię, aby rozpocząć</p>

                    <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 p-8 rounded-3xl">
                        <input value={playerName} onChange={e => handleNameChange(e.target.value)} className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 mb-4 text-white focus:border-orange-500 outline-none" placeholder="Twoje imię..." />
                        
                        <button onClick={handleCreateGame} className="w-full flex items-center justify-center gap-2 px-6 py-4 bg-orange-600 hover:bg-orange-500 rounded-xl font-bold text-white transition"><Icon name="users" /> Utwórz pokój</button>
                        
                        <div className="my-6 border-t border-zinc-800 relative"><span className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-900 px-2 text-xs text-zinc-500">LUB</span></div>
                        
                        <div className="flex gap-2">
                            <input value={joinCodeInput} onChange={e => setJoinCodeInput(e.target.value.toUpperCase())} placeholder="KOD (6 ZNAKÓW)" className="flex-1 bg-zinc-950 border border-zinc-700 rounded-xl px-4 text-center uppercase text-white outline-none focus:border-blue-500" maxLength="6" />
                            <button onClick={handleJoinGame} className="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-white transition">Dołącz</button>
                        </div>
                    </div>
                    {errorMsg && <div className="absolute top-10 bg-red-500 px-6 py-3 rounded-full text-white">{errorMsg}</div>}
                </div>
            );

            if (gameData.gameState === 'lobby') return (
                <div className="flex flex-col items-center justify-center h-screen p-6">
                    <div className="mb-8 text-center bg-zinc-900 p-6 rounded-2xl border border-zinc-800 w-full max-w-md">
                        <p className="text-zinc-500 mb-2">KOD POKOJU</p>
                        <h2 className="text-5xl font-mono text-orange-500 mb-4">{gameId}</h2>
                        <button onClick={() => { navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?room=${gameId}`); showError("Skopiowano link!"); }} className="w-full bg-blue-600 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2 text-white"><Icon name="copy" size={16}/> Skopiuj link dla znajomych</button>
                    </div>
                    <div className="w-full max-w-md bg-zinc-900 p-6 rounded-2xl mb-8">
                        <h3 className="mb-4 text-zinc-400">Gracze ({gameData.players.length}/4)</h3>
                        {gameData.players.map(p => <div key={p.uid} className="bg-zinc-950 p-3 mb-2 rounded-xl text-white">{p.name} {p.uid === MY_UID ? '(Ty)' : ''}</div>)}
                    </div>
                    {gameData.hostUid === MY_UID && <button onClick={handleStartGame} disabled={gameData.players.length < 2} className="bg-green-600 disabled:opacity-50 px-8 py-4 rounded-full font-bold flex gap-2 text-white"><Icon name="play"/> Rozpocznij</button>}
                    <button onClick={handleLeaveGame} className="mt-8 text-zinc-500 hover:text-white transition">Wyjdź z pokoju</button>
                    {errorMsg && <div className="absolute top-10 bg-blue-500 px-6 py-3 rounded-full text-white">{errorMsg}</div>}
                </div>
            );

            // --- GAMEOVER ---
            if (gameData.gameState === 'gameover') {
                const sortedPlayers = [...gameData.players].sort((a, b) => b.score - a.score);
                const winner = sortedPlayers[0];

                return (
                    <div className="flex flex-col items-center justify-center h-screen bg-zinc-950 text-white p-6 text-center">
                        <Icon name="trophy" size={80} className="text-yellow-500 mb-6" />
                        <h2 className="text-5xl font-bold mb-8">Koniec Gry!</h2>
                        
                        <div className="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-full max-w-md mb-8">
                            <h3 className="text-2xl font-bold text-yellow-400 mb-6">Zwycięzca: {winner.name}</h3>
                            <div className="flex flex-col gap-4">
                                {sortedPlayers.map((p, idx) => (
                                <div key={p.uid} className={`flex justify-between items-center text-lg bg-zinc-950 p-4 rounded-xl border ${p.uid === MY_UID ? 'border-yellow-500/50' : 'border-transparent'}`}>
                                    <span className="font-medium text-zinc-300">
                                    {idx + 1}. {p.name} {p.uid === MY_UID && '(Ty)'}
                                    </span>
                                    <span className="font-bold">{p.score} pkt</span>
                                </div>
                                ))}
                            </div>
                        </div>

                        <button 
                            onClick={handleLeaveGame}
                            className="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-full text-xl transition-colors flex items-center gap-2"
                        >
                            <Icon name="log-out" size={20}/> Wróć do menu
                        </button>
                    </div>
                );
            }

            const activePlayer = gameData.players[gameData.currentPlayerIdx];
            return (
                <div className="flex flex-col h-screen">
                    <header className="p-3 bg-zinc-950 flex justify-between items-center border-b border-zinc-800">
                        <h1 className="text-orange-500 font-bold">QWIRKLE <span className="text-xs text-zinc-500 ml-2 hidden md:inline">#{gameId}</span></h1>
                        <div className="flex gap-4 overflow-x-auto">
                            {gameData.players.map(p => <div key={p.uid} className={`text-sm ${p.uid === activePlayer.uid ? 'text-white font-bold' : 'text-zinc-500'}`}>{p.name}: {p.score}</div>)}
                        </div>
                    </header>
                    <div className={`text-center py-1 text-xs font-bold uppercase text-white ${isMyTurn ? 'bg-green-600' : 'bg-zinc-800'}`}>{isMyTurn ? 'Twój ruch!' : `Czekaj, ruch wykonuje: ${activePlayer.name}`}</div>
                    
                    {errorMsg && (
                        <div className="absolute top-24 left-1/2 -translate-x-1/2 z-50 bg-red-500/90 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2">
                            <Icon name="alert-circle" size={20} />
                            <span className="font-medium">{errorMsg}</span>
                        </div>
                    )}

                    <main ref={scrollRef} className="flex-1 overflow-auto bg-[#1a1a1c] relative cursor-grab">
                        <div style={{ width: GRID_SIZE*CELL_SIZE, height: GRID_SIZE*CELL_SIZE, display: 'grid', gridTemplateColumns: `repeat(${GRID_SIZE}, ${CELL_SIZE}px)`}}>
                            {Array.from({length: GRID_SIZE*GRID_SIZE}).map((_, i) => {
                                const x = i % GRID_SIZE, y = Math.floor(i / GRID_SIZE), key = `${x},${y}`;
                                const t = board[key] || (staged[key] ? myHand.find(h=>h.id===staged[key]) : null);
                                return <Cell key={key} x={x} y={y} tile={t} isStaged={!!staged[key]} isSelectedHand={selectedHandId!==null} disabled={!isMyTurn} onClick={handleCellClick} />;
                            })}
                        </div>
                    </main>

                    <footer className="bg-zinc-950 p-4 border-t border-zinc-800 flex flex-col items-center">
                        <div className="flex justify-center gap-2 h-14 md:h-16 mb-4 w-full max-w-xl">
                            {myHand.map(t => <div key={t.id} className="w-14 h-14 md:w-16 md:h-16"><Tile tile={t} isSelected={swapMode?swapSelection.includes(t.id):selectedHandId===t.id} isStaged={Object.values(staged).includes(t.id)} disabled={!isMyTurn} onClick={()=>handleHandClick(t.id)}/></div>)}
                        </div>
                        {swapMode ? (
                            <div className="flex gap-2"><button onClick={()=>setSwapMode(false)} className="px-4 py-2 bg-zinc-700 rounded-lg text-white">Anuluj</button><button onClick={handleSwapConfirm} className="px-4 py-2 bg-blue-600 rounded-lg text-white">Zatwierdź wymianę</button></div>
                        ) : (
                            <div className="flex gap-2 w-full max-w-md">
                                <button onClick={()=>setSwapMode(true)} disabled={!isMyTurn || gameData.bag.length===0} className="flex-1 bg-zinc-800 py-2 rounded-lg disabled:opacity-50 text-white">Wymień</button>
                                <button onClick={()=>{setStaged({}); setSelectedHandId(null);}} disabled={!isMyTurn || Object.keys(staged).length===0} className="flex-1 bg-zinc-800 py-2 rounded-lg disabled:opacity-50 text-white">Cofnij</button>
                                <button onClick={handleConfirmTurn} disabled={!isMyTurn || Object.keys(staged).length===0} className="flex-[2] bg-green-600 py-2 rounded-lg font-bold disabled:opacity-50 text-white">Zatwierdź</button>
                            </div>
                        )}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
